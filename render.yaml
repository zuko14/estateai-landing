services:
  - type: web
    name: realestate-leads
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: AGENT_NAME
        sync: false
      - key: AGENT_PHONE
        sync: false
      - key: AGENT_EMAIL
        sync: false
      - key: HOT_LEAD_THRESHOLD
        value: "70"
      - key: WARM_LEAD_THRESHOLD
        value: "40"
      - key: SHEETS_WRITE_BATCH_INTERVAL_MS
        value: "5000"
    healthCheckPath: /health
    autoDeploy: true
